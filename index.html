<script>

const API_URL =
"https://sexta-feira-p8np.onrender.com/perguntar";

let recognition;
let micAtivo = false;

// ================= SESSION =================

let session_id =
localStorage.getItem("session_id");

if (!session_id) {

    session_id =
    "sessao_" +
    Math.random()
    .toString(36)
    .substring(2);

    localStorage.setItem(
    "session_id",
    session_id
    );
}

// ================= PERFIL ESPECIAL =================

const sessaoEspecial =
"sessao_lp2yvm3a7ff";

if(session_id === sessaoEspecial){

    // muda título
    document.querySelector(".logo")
    .innerText = "SEXTA-FEIRA 💙";

    // subtítulo
    document.querySelector(".sub")
    .innerText =
    "interface sincronizada";

    // fundo
    document.body.style.background =
    "linear-gradient(180deg,#020b1d,#001d3d)";

    // planeta
    document.querySelector(".planet")
    .style.background =
    "radial-gradient(circle,#9ed8ff,#0066ff)";

    // relógio
    document.querySelector(".time")
    .style.color = "#6ec6ff";

    // resposta inicial
    document.getElementById("resposta")
    .innerText =
    "Oi princesa. Sistema conectado ✨";

    // cria intro
    const aviso =
    document.createElement("div");

    aviso.id = "introEspecial";

    aviso.innerHTML = `
        PERFIL DETECTADO
        <span>Sincronizando interface...</span>
    `;

    document.body.appendChild(aviso);

    // fade
    setTimeout(()=>{

        aviso.style.opacity = "0";

    },3000);

    // remove
    setTimeout(()=>{

        aviso.remove();

    },4000);
}

// ================= RELÓGIO =================

function atualizarHora(){

    const agora = new Date();

    document.getElementById(
    "hora"
    ).innerText =
    agora.toLocaleTimeString("pt-BR");

    document.getElementById(
    "data"
    ).innerText =
    agora.toLocaleDateString(
    "pt-BR",
    {
        weekday:"long",
        day:"numeric",
        month:"long"
    }
    );
}

setInterval(atualizarHora, 1000);

atualizarHora();

// ================= IA =================

async function enviarTexto(texto){

    document.getElementById(
    "perguntaTexto"
    ).innerText = texto;

    try{

        const res = await fetch(API_URL, {

            method: "POST",

            headers: {
                "Content-Type":"application/json"
            },

            body: JSON.stringify({
                mensagem: texto,
                session_id: session_id
            })
        });

        const data = await res.json();

        console.log(data);

        const resposta =
        data.resposta || "Erro na resposta";

        document.getElementById(
        "resposta"
        ).innerText = resposta;

        // ================= ÁUDIO =================

        if(data.audio){

            const audio = new Audio(
            "https://sexta-feira-p8np.onrender.com"
            + data.audio
            );

            audio.play();
        }

        // ================= LINKS =================

        if(data.abrir_link){

            window.open(
            data.abrir_link,
            "_blank"
            );
        }

    } catch(err){

        console.log(err);

        document.getElementById(
        "resposta"
        ).innerText =
        "Erro ao conectar com a IA.";
    }
}

// ================= INPUT =================

function enviarPergunta(){

    const texto =
    document.getElementById(
    "pergunta"
    ).value;

    if(!texto) return;

    enviarTexto(texto);

    document.getElementById(
    "pergunta"
    ).value = "";
}

// ENTER ENVIA

document.getElementById(
"pergunta"
).addEventListener(
"keydown",
function(event){

    if(event.key === "Enter"){

        enviarPergunta();
    }
}
);

// ================= MICROFONE =================

function toggleMic(){

    if(!(
    'webkitSpeechRecognition'
    in window
    )){

        alert(
        "Seu navegador não suporta voz"
        );

        return;
    }

    if(!recognition){

        recognition =
        new webkitSpeechRecognition();

        recognition.lang = "pt-BR";

        recognition.continuous = true;

        recognition.onresult = (event) => {

            const texto =
            event.results[
            event.results.length - 1
            ][0].transcript;

            if(
            texto.trim().length < 2
            ) return;

            enviarTexto(texto);
        };
    }

    if(!micAtivo){

        recognition.start();

        micAtivo = true;

        document.querySelector(".mic")
        .innerText =
        "🔴 Ouvindo...";

    } else {

        recognition.stop();

        micAtivo = false;

        document.querySelector(".mic")
        .innerText =
        "🎙️ Falar";
    }
}

</script>
